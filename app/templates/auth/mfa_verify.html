<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ _('MFA Verification') }} - ISO 27001 - NIS2 - GDPR</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; }
    .mfa-card { border: none; border-radius: 1.25rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; }
    .mfa-header { background: linear-gradient(135deg, #1a56db, #1243af); padding: 2rem; text-align: center; }
    .mfa-header h2 { color: #fff; font-weight: 700; font-size: 1.3rem; }
    .mfa-body { padding: 2.5rem; }
  </style>
</head>
<body>
  <div class="container"><div class="row justify-content-center"><div class="col-md-5 col-lg-4">
    <div class="mfa-card">
      <div class="mfa-header">
        <i class="fas fa-shield-alt mb-3" style="font-size: 2rem; color: rgba(255,255,255,0.9);"></i>
        <h2>{{ _('Two-Factor Authentication') }}</h2>
        <p class="text-white-50 small mb-0">{{ _('Enter the code from your authenticator app') }}</p>
      </div>
      <div class="mfa-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
          {% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-4">
            <label class="form-label fw-medium small text-muted">{{ _('Authentication Code') }}</label>
            <input type="text" name="totp_code" class="form-control form-control-lg text-center" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="off" style="font-size: 1.5rem; letter-spacing: 0.5rem;" required>
          </div>
          <button type="submit" class="btn btn-primary w-100"><i class="fas fa-check me-2"></i>{{ _('Verify') }}</button>
        </form>
        <div class="mt-3 text-center"><a href="{{ url_for('auth.login') }}" class="small text-muted"><i class="fas fa-arrow-left me-1"></i>{{ _('Back to login') }}</a></div>
      </div>
    </div>
  </div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
