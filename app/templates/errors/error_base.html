<!DOCTYPE html>
<html lang="{{ current_lang|default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ _('Error') }}{% endblock %} - ISO 27001 - NIS2 - GDPR</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-card { background: #fff; border-radius: 1rem; box-shadow: 0 4px 24px rgba(0,0,0,0.06); padding: 3rem; text-align: center; max-width: 480px; width: 100%; }
    .error-card h1 { font-size: 5rem; font-weight: 800; line-height: 1; margin-bottom: 0.5rem; }
    .error-card p { color: #6b7280; font-size: 1.1rem; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="error-card">
    {% block error_content %}{% endblock %}
  </div>
</body>
</html>
