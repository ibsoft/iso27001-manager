{% extends "base.html" %}
{% block page_title %}{{ _('Department') }}{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('admin.list_departments') }}">{{ _('Departments') }}</a></li>
<li class="breadcrumb-item active">{{ dept.name if dept else _('New Department') }}</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label small">{{ _('Name') }} <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ dept.name if dept else '' }}" required maxlength="128">
          </div>
          <div class="mb-3">
            <label class="form-label small">{{ _('Description') }}</label>
            <textarea name="description" class="form-control" rows="3">{{ dept.description if dept else '' }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label small">{{ _('Department Head') }}</label>
            <select name="head_id" class="form-select">
              <option value="">—</option>
              {% for u in users %}
              <option value="{{ u.id }}" {{ 'selected' if dept and dept.head_id == u.id }}>{{ u.full_name }}</option>
              {% endfor %}
            </select>
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>{{ _('Save') }}</button>
          <a href="{{ url_for('admin.list_departments') }}" class="btn btn-secondary">{{ _('Cancel') }}</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
